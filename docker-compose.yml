# Gestão Projetos — sem `ports` aqui: o EasyPanel avisa conflito se o compose publicar porta no host.
# No painel, defina a porta interna do container como 5173 (é onde o Vite escuta).
# Se o domínio apontar para `http://noxa_producao_gp:5173`, o alias abaixo faz esse hostname resolver para este container (senão o proxy pode dar 502).
services:
  WEB:
    image: node:22-bookworm
    working_dir: /app
    expose:
      - "5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "NODE_ENV=development npm ci && NODE_ENV=production npm run build && NODE_ENV=production npm run preview"
    stdin_open: true
    tty: true
    networks:
      default:
        aliases:
          - noxa_producao_gp

volumes:
  node_modules:
