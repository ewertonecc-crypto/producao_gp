# Gestão Projetos — sem `ports` aqui: o EasyPanel avisa conflito se o compose publicar porta no host.
# No painel, defina a porta interna do container como 4001 (é onde o Vite escuta).
services:
  web:
    image: node:22-bookworm
    working_dir: /app
    expose:
      - "4001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 4001"
    stdin_open: true
    tty: true

volumes:
  node_modules:
